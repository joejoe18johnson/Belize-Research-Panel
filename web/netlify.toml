# Next.js on Netlify — config lives beside package.json (Package directory: web)
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/
#
# Netlify UI: leave Publish directory BLANK (plugin manages output).
# Set Package directory to "web" if Base directory is repo root.

[build]
  command = "npm run build:netlify"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"
  NEXT_PUBLIC_USE_TEXT_LOGO = "true"
  NEXT_PUBLIC_ENABLE_DEMO_ACCOUNTS = "true"
  ENABLE_DEMO_ACCOUNTS = "true"

[context.production.environment]
  NEXT_PUBLIC_USE_TEXT_LOGO = "true"
  NEXT_PUBLIC_ENABLE_DEMO_ACCOUNTS = "true"
  ENABLE_DEMO_ACCOUNTS = "true"

[context.deploy-preview.environment]
  ENABLE_DEMO_ACCOUNTS = "true"
  NEXT_PUBLIC_ENABLE_DEMO_ACCOUNTS = "true"
  NEXT_PUBLIC_USE_TEXT_LOGO = "true"

[context.branch-deploy.environment]
  ENABLE_DEMO_ACCOUNTS = "true"
  NEXT_PUBLIC_ENABLE_DEMO_ACCOUNTS = "true"
  NEXT_PUBLIC_USE_TEXT_LOGO = "true"

[dev]
  command = "npm run dev"
  targetPort = 3000
  autoLaunch = false

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"
